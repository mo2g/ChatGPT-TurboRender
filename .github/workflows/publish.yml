name: Publish store releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string
      target:
        description: Store target
        required: true
        default: both
        type: choice
        options:
          - both
          - chrome
          - edge

concurrency:
  group: publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NODE_VERSION: 24
  PNPM_VERSION: 9.14.2

jobs:
  package:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

      - id: version
        name: Resolve release version
        shell: bash
        env:
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${RELEASE_VERSION_INPUT}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          VERSION="${VERSION#v}"

          if [[ -z "${VERSION}" ]]; then
            echo "Release version is required." >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          npm pkg set version="${VERSION}"

      - name: Build Chrome package
        run: pnpm zip

      - name: Build Edge package
        run: pnpm zip:edge

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: browser-packages-${{ steps.version.outputs.version }}
          path: |
            .output/chatgpt-turborender-${{ steps.version.outputs.version }}-chrome.zip
            .output/chatgpt-turborender-${{ steps.version.outputs.version }}-edge.zip
          if-no-files-found: error

  publish-chrome:
    needs: package
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'push'
        || inputs.target == 'both'
        || inputs.target == 'chrome'
      }}
    env:
      CHROME_WEB_STORE_SERVICE_ACCOUNT_JSON: ${{ secrets.CHROME_WEB_STORE_SERVICE_ACCOUNT_JSON }}
      CHROME_WEB_STORE_PUBLISHER_ID: ${{ secrets.CHROME_WEB_STORE_PUBLISHER_ID }}
      CHROME_WEB_STORE_ITEM_ID: ${{ secrets.CHROME_WEB_STORE_ITEM_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: browser-packages-${{ needs.package.outputs.version }}
          path: .release

      - name: Publish to Chrome Web Store
        if: >-
          ${{
            env.CHROME_WEB_STORE_SERVICE_ACCOUNT_JSON != ''
            && env.CHROME_WEB_STORE_PUBLISHER_ID != ''
            && env.CHROME_WEB_STORE_ITEM_ID != ''
          }}
        env:
          RELEASE_VERSION: ${{ needs.package.outputs.version }}
        run: >
          node ./scripts/publish-stores.mjs
          --target chrome
          --version "$RELEASE_VERSION"
          --chrome-zip ".release/chatgpt-turborender-${{ needs.package.outputs.version }}-chrome.zip"

  publish-edge:
    needs: package
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'push'
        || inputs.target == 'both'
        || inputs.target == 'edge'
      }}
    env:
      EDGE_ADDONS_API_KEY: ${{ secrets.EDGE_ADDONS_API_KEY }}
      EDGE_ADDONS_CLIENT_ID: ${{ secrets.EDGE_ADDONS_CLIENT_ID }}
      EDGE_ADDONS_PRODUCT_ID: ${{ secrets.EDGE_ADDONS_PRODUCT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: browser-packages-${{ needs.package.outputs.version }}
          path: .release

      - name: Publish to Microsoft Edge Add-ons
        if: >-
          ${{
            env.EDGE_ADDONS_API_KEY != ''
            && env.EDGE_ADDONS_CLIENT_ID != ''
            && env.EDGE_ADDONS_PRODUCT_ID != ''
          }}
        env:
          RELEASE_VERSION: ${{ needs.package.outputs.version }}
        run: >
          node ./scripts/publish-stores.mjs
          --target edge
          --version "$RELEASE_VERSION"
          --edge-zip ".release/chatgpt-turborender-${{ needs.package.outputs.version }}-edge.zip"
